name: Build Final AutoGrader v6

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 修正參數為 --noupx
          pyinstaller --noconsole --onefile --noupx --name "AutoGrader_v6_Final" AutoGrader_Final_v6.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_v6_Package
          path: dist/AutoGrader_v6_Final.exe
