name: Build Final AutoGrader v7.1

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保所有必要的庫都已安裝
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 將指令寫成單行，避免 PowerShell 換行符號 (^) 造成的編譯錯誤
          pyinstaller --noconsole --onefile --noupx --collect-all google.generativeai --collect-all customtkinter --collect-all docx --name "AutoGrader_v7.1_Final" AutoGrader_cloud.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Final_Download
          # 確保路徑與上面的 --name 一致，並加上 .exe
          path: dist/AutoGrader_v7.1_Final.exe
