name: Build Final AutoGrader v7.1

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保所有必要的庫都已安裝
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 關鍵：移除 --onefile，改用 --onedir (資料夾模式)
          # 並額外增加 --collect-all google_auth 以防萬一
          pyinstaller --noconsole --onedir --noupx --collect-all google.generativeai --collect-all customtkinter --collect-all docx --collect-all googleapiclient --name "AutoGrader_v7.1_Final" AutoGrader_cloud.py
          pyinstaller --noconsole --onedir --noupx --collect-all fitz AutoGrader_cloud.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Final_Package
          # 注意：這裡路徑改為整個資料夾目錄
          path: dist/AutoGrader_v7.1_Final/
