name: Build Final AutoGrader v7.1

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保所有必要的庫都已安裝
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 關鍵修正：加入 --collect-all 確保 Gemini API 和 UI 資源被正確抓取
          # 注意：將 --onefile 改回建議的穩定打包模式（如果你堅持要 onefile 也可以，但啟動會較慢）
          pyinstaller --noconsole --onefile --noupx ^
          --collect-all google.generativeai ^
          --collect-all customtkinter ^
          --collect-all docx ^
          --name "AutoGrader_Final" AutoGrader_cloud.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Final_Download
          # 注意這裡的路徑要跟上面 --name 設定的對齊 (windows 會自動加 .exe)
          path: dist/AutoGrader_Final.exe
