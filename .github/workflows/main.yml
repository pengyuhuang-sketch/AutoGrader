name: Build Final AutoGrader

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 1. 移除不支援的 --no-compress
          # 2. 加入 --noupx 確保不進行額外壓縮，減少解壓失敗風險
          # 3. 確保檔名與你上傳的 Python 檔案一致
          pyinstaller --noconsole --onefile --noupx --name "AutoGrader_Final_v6" AutoGrader_Final_v6.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release_EXE
          path: dist/AutoGrader_Final_v5.exe
