name: Build Final AutoGrader

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 使用 --no-compress 解決 PIL 解壓失敗問題
          pyinstaller --noconsole --onefile --no-compress --name "AutoGrader_Final_v5" AutoGrader_Final_Cloud.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release_EXE
          path: dist/AutoGrader_Final_v5.exe
