name: Build Final AutoGrader v6

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          # 升級 API 套件
          pip install --upgrade google-generativeai
          # 使用 --noupx 確保穩定性
          pyinstaller --noconsole --onefile --noupx --name "AutoGrader_final" AutoGrader_cloud.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Package
          path: dist/AutoGrader_Final.exe
