name: Build AutoGrader EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4 # 升級到 v4
      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pyinstaller pymupdf customtkinter pandas openpyxl python-docx google-generativeai
      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --collect-all fitz AutoGrader_cloud.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 關鍵修正：必須使用 v4
        with:
          name: AutoGrader-Finished-EXE
          path: dist/AutoGrader_cloud.exe
